<!DOCTYPE html>
<html>

<head>

  <title>Price History</title>

  <script src="chart.js"></script>

  <style>

    body {

      margin: 0;

      font-family: Arial;

      display: flex;

      height: 100vh;

    }

    #sidebar {

      width: 320px;

      border-right: 1px solid #ddd;

      overflow-y: auto;

      padding: 10px;

      background: #fafafa;

    }

    #sidebar h2 {

      margin-top: 0;

    }

    .product-item {

      padding: 12px;

      border: 1px solid #ddd;

      border-radius: 8px;

      margin-bottom: 10px;

      cursor: pointer;

      background: white;

      transition: 0.2s;

    }

    .product-item:hover {

      background: #f3f3f3;

    }

    .product-name {

      font-size: 14px;

      font-weight: bold;

      margin-bottom: 5px;

    }

    .product-price {

      color: green;

      font-weight: bold;

    }

    #chartContainer {

      flex: 1;

      padding: 20px;

    }

    canvas {

      max-width: 100%;

      max-height: 80vh;

    }

    #productTitle {

      margin-bottom: 20px;

    }

  </style>

</head>

<body>

  <div id="sidebar">

    <h2>Wishlist Products</h2>

    <div id="productList"></div>

  </div>

  <div id="chartContainer">

    <h2 id="productTitle">
      Select Product
    </h2>

    <canvas id="priceChart"></canvas>

  </div>

  <script src="history.js"></script>

</body>

</html>
